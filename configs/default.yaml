# ─────────────────────────────────────────────────────────────────────────────
# WavTokenizer  —  Default Configuration
# Paper: https://arxiv.org/abs/2408.16532  (ICLR 2025)
# ─────────────────────────────────────────────────────────────────────────────

project:
  name: wavtokenizer
  run_name: default_run          # overridden by CLI --run_name
  seed: 42
  log_dir: logs
  checkpoint_dir: checkpoints
  tensorboard: true
  wandb: false                   # set true + fill entity/project below
  wandb_entity: null
  wandb_project: wavtokenizer

# ─── Audio ───────────────────────────────────────────────────────────────────
audio:
  sample_rate: 24000             # Hz
  token_rate: 75                 # 40 or 75 tokens per second
  segment_duration: 1.0          # training crop length in seconds
  hop_length: 320                # sample_rate // token_rate  (auto if null)

# ─── Encoder ─────────────────────────────────────────────────────────────────
encoder:
  in_channels: 1
  base_channels: 32
  latent_dim: 512
  # strides whose product == hop_length
  # 2×4×5×8 = 320  → 75 tok/s   |   2×4×5×15 = 600  → 40 tok/s
  strides: [2, 4, 5, 8]
  residual_dilations: [1, 3, 9]  # per residual block

# ─── Vector Quantizer ────────────────────────────────────────────────────────
quantizer:
  codebook_size: 4096
  embedding_dim: 512             # must match encoder.latent_dim
  commitment_cost: 0.25
  dead_threshold: 100            # EMA steps before dead-code re-init

# ─── Decoder ─────────────────────────────────────────────────────────────────
decoder:
  hidden: 512
  n_convnext: 8
  n_heads: 8
  convnext_kernel: 7
  convnext_expansion: 4
  istft_n_fft: 640               # ≈ 2 × hop_length
  istft_hop_length: 320          # must match audio.hop_length

# ─── Discriminators ──────────────────────────────────────────────────────────
discriminator:
  mpd_periods: [2, 3, 5, 7, 11]
  msd_scales: 3
  mrstftd_resolutions:           # [n_fft, hop, win]
    - [1024, 120, 600]
    - [2048, 240, 1200]
    - [512,   50,  240]

# ─── Loss Weights ────────────────────────────────────────────────────────────
loss:
  lambda_adv: 1.0
  lambda_fm: 2.0
  lambda_mel: 45.0
  lambda_vq: 1.0
  mel_scales: [32, 64, 128, 256, 512, 1024, 2048]

# ─── Training ────────────────────────────────────────────────────────────────
training:
  epochs: 1000
  batch_size: 16
  num_workers: 4
  pin_memory: true
  grad_clip: 10.0
  mixed_precision: true          # torch.amp  (bf16 on Ampere+, else fp16)
  amp_dtype: bfloat16            # float16 | bfloat16
  compile: false                 # torch.compile (PyTorch ≥ 2.0)
  disc_start_epoch: 0            # epoch to start adversarial training
  log_interval: 50               # steps between console logs
  eval_interval: 1               # epochs between evaluations
  save_interval: 5               # epochs between checkpoints
  keep_last_n: 5                 # how many checkpoints to retain

# ─── Optimiser ───────────────────────────────────────────────────────────────
optimizer:
  type: adamw                    # adam | adamw | lion
  lr_g: 2.0e-4
  lr_d: 2.0e-4
  betas: [0.8, 0.99]
  weight_decay: 1.0e-6
  eps: 1.0e-8

# ─── LR Scheduler ────────────────────────────────────────────────────────────
scheduler:
  type: exponential              # exponential | cosine | none
  gamma: 0.999                   # for exponential
  warmup_steps: 1000             # linear warm-up before main schedule

# ─── Dataset ─────────────────────────────────────────────────────────────────
data:
  # ---- LibriTTS  (auto-downloaded) ----
  use_libritts: true
  libritts_root: data/libritts
  libritts_splits:               # torchaudio split names
    - train-clean-100
    - train-clean-360
  # ---- Custom WAV files ----
  use_custom: false
  custom_train_dir: null         # path to directory of .wav files for train
  custom_val_dir: null
  # ---- Shared ----
  val_split_fraction: 0.01       # fraction of train set used for validation
  min_duration_sec: 0.5
  max_duration_sec: 10.0

# ─── Inference / Export ──────────────────────────────────────────────────────
inference:
  checkpoint: null               # path to .pth checkpoint for inference
  output_dir: outputs

# ─── Augmentation ─────────────────────────────────────────────────────────────
# Applied to the training set only. Set enabled: false to disable entirely.
  augmentation:
    enabled: false               # flip to true to activate
    noise:
      p: 0.4
      min_snr_db: 10.0
      max_snr_db: 40.0
    gain:
      p: 0.5
      min_db: -6.0
      max_db: 6.0
    polarity:
      p: 0.5
    lowpass:
      p: 0.2
      min_cutoff_hz: 3000.0
      max_cutoff_hz: 8000.0
    highpass:
      p: 0.2
      min_cutoff_hz: 60.0
      max_cutoff_hz: 200.0
    band_dropout:
      p: 0.2
      n_bands: 2
    rir:
      p: 0.3
      min_rt60_ms: 50.0
      max_rt60_ms: 600.0
    pitch_shift:
      p: 0.2
      min_semitones: -2.0
      max_semitones: 2.0
    time_stretch:
      p: 0.2
      max_factor: 1.1
